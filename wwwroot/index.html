<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sản Phẩm - Shoe Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .filter-sidebar {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            min-height: 80vh;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="filter-sidebar shadow-sm">
                    <h5>Bộ lọc nâng cao</h5>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Tên giày</label>
                        <input type="text" id="searchName" class="form-control" placeholder="Nhập tên...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Thương hiệu (Brand)</label>
                        <select id="filterBrand" class="form-select"><option value="">Tất cả</option></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Danh mục (Category)</label>
                        <select id="filterCategory" class="form-select"><option value="">Tất cả</option></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá tối đa (VND)</label>
                        <input type="number" id="filterPrice" class="form-control" placeholder="Ví dụ: 3000000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Trạng thái</label>
                        <select id="filterStatus" class="form-select">
                            <option value="">Tất cả</option>
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100" onclick="loadShoes()">Áp dụng lọc</button>
                </div>
            </div>

            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Danh sách sản phẩm giày</h2>
                    <button class="btn btn-success" onclick="openCreateModal()">+ Thêm sản phẩm mới</button>
                </div>

                <table class="table table-striped table-hover shadow-sm">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Tên Giày</th>
                            <th>Thương hiệu</th>
                            <th>Danh mục</th>
                            <th>Giá (VND)</th>
                            <th>Kho</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="shoeTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="shoeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Thêm sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="shoeId">
                    <div class="mb-3">
                        <label class="form-label">Tên giày *</label>
                        <input type="text" id="shoeName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá (VND) *</label>
                        <input type="number" id="shoePrice" class="form-control" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số lượng kho *</label>
                        <input type="number" id="shoeStock" class="form-control" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Thương hiệu</label>
                        <select id="shoeBrand" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Danh mục</label>
                        <select id="shoeCategory" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Trạng thái</label>
                        <select id="shoeStatus" class="form-select">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveShoe()">Lưu lại</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE = "/odata";
        let bootstrapModal;

        document.addEventListener("DOMContentLoaded", function () {
            bootstrapModal = new bootstrap.Modal(document.getElementById('shoeModal'));
            loadMetadata(); // Thiết lập dữ liệu dropdown cố định dựa theo Seed Data SQL
            loadShoes();    // Tải danh sách sản phẩm từ OData
        });

        // Hàm điền dữ liệu đồng bộ với Seed Data của Database
        async function loadMetadata() {
            try {
                const brands = [
                    { BrandId: 1, BrandName: "Nike" },
                    { BrandId: 2, BrandName: "Adidas" },
                    { BrandId: 3, BrandName: "Puma" }
                ];
                const categories = [
                    { CategoryId: 1, CategoryName: "Running" },
                    { CategoryId: 2, CategoryName: "Basketball" },
                    { CategoryId: 3, CategoryName: "Lifestyle" }
                ];

                let brandFilterOptions = '<option value="">Tất cả</option>' + brands.map(b => `<option value="${b.BrandId}">${b.BrandName}</option>`).join('');
                let catFilterOptions = '<option value="">Tất cả</option>' + categories.map(c => `<option value="${c.CategoryId}">${c.CategoryName}</option>`).join('');

                let brandModalOptions = brands.map(b => `<option value="${b.BrandId}">${b.BrandName}</option>`).join('');
                let catModalOptions = categories.map(c => `<option value="${c.CategoryId}">${c.CategoryName}</option>`).join('');

                document.getElementById("filterBrand").innerHTML = brandFilterOptions;
                document.getElementById("shoeBrand").innerHTML = brandModalOptions;
                document.getElementById("filterCategory").innerHTML = catFilterOptions;
                document.getElementById("shoeCategory").innerHTML = catModalOptions;
            } catch (err) {
                console.error("Lỗi khởi tạo cấu hình bộ lọc:", err);
            }
        }

        // TÍNH NĂNG CHÍNH: Lấy dữ liệu thông qua truy vấn ODATA nâng cao
        async function loadShoes() {
            let queryParams = [];

            // 1. Tạo câu truy vấn OData $expand để nhúng thực thể liên quan
            queryParams.push("$expand=Brand,Category");

            // 2. Tạo câu truy vấn $filter dựa vào dữ liệu nhập từ Sidebar nâng cao
            let filterParts = [];
            let name = document.getElementById("searchName").value;
            let brandId = document.getElementById("filterBrand").value;
            let catId = document.getElementById("filterCategory").value;
            let maxPrice = document.getElementById("filterPrice").value;
            let status = document.getElementById("filterStatus").value;

            // Chú ý: Sử dụng tên thuộc tính viết hoa hoặc chữ thường tùy thuộc cấu hình Json OData, mặc định OData v8 hỗ trợ viết hoa theo Model C# ở truy vấn
            if (name) filterParts.push(`contains(ShoeName, '${name}')`);
            if (brandId) filterParts.push(`BrandId eq ${brandId}`);
            if (catId) filterParts.push(`CategoryId eq ${catId}`);
            if (maxPrice) filterParts.push(`Price le ${maxPrice}`);
            if (status) {
                // Nếu giá trị chọn là "1" thì truyền chữ true, ngược lại chọn "0" thì truyền chữ false
                let boolStatus = (status === "1") ? "true" : "false";
                filterParts.push(`Status eq ${boolStatus}`);
            }

            if (filterParts.length > 0) {
                queryParams.push(`$filter=${filterParts.join(' and ')}`);
            }

            // Ráp đường dẫn OData hoàn chỉnh
            let url = `${API_BASE}/Shoes?${queryParams.join('&')}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("API Response Error");

                const data = await res.json();
                const shoes = data.value || data;

                let html = '';
                shoes.forEach(s => {
                    // Xử lý an toàn phòng trường hợp OData trả về chữ thường (camelCase) hoặc chữ hoa
                    let sId = s.ShoeId !== undefined ? s.ShoeId : s.shoeId;
                    let sName = s.ShoeName !== undefined ? s.ShoeName : s.shoeName;
                    let sPrice = s.Price !== undefined ? s.Price : s.price;
                    let sStock = s.StockQuantity !== undefined ? s.StockQuantity : s.stockQuantity;
                    let sStatus = s.Status !== undefined ? s.Status : s.status;
                    let sBrand = s.Brand !== undefined ? s.Brand : s.brand;
                    let sCategory = s.Category !== undefined ? s.Category : s.category;

                    let brandName = sBrand ? (sBrand.BrandName || sBrand.brandName) : 'N/A';
                    let categoryName = sCategory ? (sCategory.CategoryName || sCategory.categoryName) : 'N/A';

                    html += `
                            <tr>
                                <td>${sId}</td>
                                <td><strong>${sName}</strong></td>
                                <td>${brandName}</td>
                                <td>${categoryName}</td>
                                <td class="text-danger fw-bold">${parseFloat(sPrice).toLocaleString('vi-VN')} đ</td>
                                <td>${sStock}</td>
                                <td><span class="badge ${sStatus ? 'bg-success' : 'bg-secondary'}">${sStatus ? 'Active' : 'Inactive'}</span></td>
                                <td>
                                    <button class="btn btn-sm btn-warning" onclick="openEditModal(${sId})">Sửa</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteShoe(${sId})">Xóa</button>
                                </td>
                            </tr>`;
                });
                document.getElementById("shoeTableBody").innerHTML = html;
            } catch (err) {
                alert("Không thể kết nối đến Backend API để lấy danh sách giày.");
            }
        }

        // Mở Popup thêm mới
        function openCreateModal() {
            document.getElementById("modalTitle").innerText = "Thêm sản phẩm mới";
            document.getElementById("shoeId").value = "";
            document.getElementById("shoeName").value = "";
            document.getElementById("shoePrice").value = "";
            document.getElementById("shoeStock").value = "0";
            document.getElementById("shoeStatus").value = "1";
            bootstrapModal.show();
        }

        // Mở Popup Sửa và đắp dữ liệu trả về từ API vào form
        async function openEditModal(id) {
            document.getElementById("modalTitle").innerText = "Cập nhật sản phẩm #" + id;
            try {
                const res = await fetch(`${API_BASE}/Shoes(${id})`);
                if (!res.ok) throw new Error("Not Found");
                const shoe = await res.json();

                // Ánh xạ linh hoạt giữa kiểu chữ hoa và chữ thường của OData
                document.getElementById("shoeId").value = shoe.ShoeId !== undefined ? shoe.ShoeId : shoe.shoeId;
                document.getElementById("shoeName").value = shoe.ShoeName !== undefined ? shoe.ShoeName : shoe.shoeName;
                document.getElementById("shoePrice").value = shoe.Price !== undefined ? shoe.Price : shoe.price;
                document.getElementById("shoeStock").value = shoe.StockQuantity !== undefined ? shoe.StockQuantity : shoe.stockQuantity;
                document.getElementById("shoeStatus").value = shoe.Status !== undefined ? (shoe.Status ? "1" : "0") : (shoe.status ? "1" : "0");
                document.getElementById("shoeBrand").value = shoe.BrandId !== undefined ? shoe.BrandId : shoe.brandId;
                document.getElementById("shoeCategory").value = shoe.CategoryId !== undefined ? shoe.CategoryId : shoe.categoryId;

                bootstrapModal.show();
            } catch (err) {
                alert("Lỗi khi tải thông tin chi tiết sản phẩm.");
            }
        }

        // Thực hiện LƯU dữ liệu (POST hoặc PUT)
        async function saveShoe() {
            const id = document.getElementById("shoeId").value;

            // Đồng bộ định dạng hoa chữ cái đầu để tránh lỗi Model Binding ở OData Backend
            const bodyData = {
                ShoeName: document.getElementById("shoeName").value,
                Price: parseFloat(document.getElementById("shoePrice").value),
                StockQuantity: parseInt(document.getElementById("shoeStock").value),
                Status: document.getElementById("shoeStatus").value === "1", // Chuyển về boolean true/false cho kiểu BIT
                BrandId: parseInt(document.getElementById("shoeBrand").value),
                CategoryId: parseInt(document.getElementById("shoeCategory").value)
            };

            // Frontend Validation
            if (!bodyData.ShoeName || isNaN(bodyData.Price) || bodyData.Price <= 0 || isNaN(bodyData.StockQuantity) || bodyData.StockQuantity < 0) {
                alert("Vui lòng kiểm tra lại thông tin nhập liệu (Tên không trống, Giá > 0, Kho >= 0)!");
                return;
            }

            let url = `${API_BASE}/Shoes`;
            let method = "POST";

            if (id) {
                url = `${API_BASE}/Shoes(${id})`;
                method = "PUT";
                bodyData.ShoeId = parseInt(id); // Ép buộc đính kèm khóa chính trong body khi gửi lệnh PUT đến OData
            }

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });

                if (res.ok) {
                    bootstrapModal.hide();
                    loadShoes(); // Tải lại danh sách sau khi hoàn tất thành công
                } else {
                    const errText = await res.text();
                    alert("Lỗi từ hệ thống Backend: " + errText);
                }
            } catch (err) {
                alert("Không thể kết nối đến máy chủ để lưu sản phẩm.");
            }
        }

        // TÍNH NĂNG XÓA sản phẩm giày
        async function deleteShoe(id) {
            if (confirm(`Bạn có chắc chắn muốn xóa sản phẩm Giày mã số #${id}?`)) {
                try {
                    const res = await fetch(`${API_BASE}/Shoes(${id})`, { method: "DELETE" });
                    if (res.ok) {
                        loadShoes(); // Làm mới lại bảng
                    } else {
                        alert("Lỗi từ hệ thống khi thực hiện xóa.");
                    }
                } catch (err) {
                    alert("Lỗi kết nối API.");
                }
            }
        }
    </script>
</body>
</html>
