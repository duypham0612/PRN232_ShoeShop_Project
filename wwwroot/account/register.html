<!-- File encoding: UTF-8 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - ShoeShop</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <h1>Register</h1>
    <form id="registerForm">
      <label for="name">Full name</label>
      <input id="name" name="name" type="text" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" />

      <label for="address">Address</label>
      <input id="address" name="address" type="text" />

      <div id="error" class="error" style="display:none;color:#ef4444;margin-top:8px;font-size:13px"></div>

      <button type="submit" class="btn primary">Register</button>

      <div class="actions">
        <a href="/account/login.html" class="btn link">Already have an account? Login</a>
      </div>
    </form>
  </div>

  <script>
    async function postJson(url, data) {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const text = await resp.text();
      try { return { ok: resp.ok, data: JSON.parse(text) }; } catch { return { ok: resp.ok, data: text }; }
    }

    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';

      if (!name || !email || !password) {
        errEl.textContent = 'Full name, email and password are required.';
        errEl.style.display = 'block';
        return;
      }

      const result = await postJson('/api/auth/register', { fullName: name, email, password, phone, address });
      if (!result.ok) {
        errEl.textContent = (typeof result.data === 'string') ? result.data : 'Registration failed.';
        errEl.style.display = 'block';
        return;
      }

      // Redirect to login after successful registration
      window.location.href = '/account/login.html';
    });
  </script>
</body>
</html>
